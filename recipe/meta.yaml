{% set name = "unsloth" %}
{% set version = "2026.4.7" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/unsloth-{{ version }}.tar.gz
  sha256: e6faee9d6340c42950ccce1f5cbfdbb3ea97726cc0d7400e9f1fc63b905201fd

build:
  noarch: python
  script:
    - sed -i.bak "s/protobuf<4.0.0/protobuf/g" pyproject.toml
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    # direct
    - typer
    - pydantic
    - pyyaml
    - nest-asyncio
    # torch / xformers
    - pytorch >=2.4.0
    - xformers >=0.0.27.post2
    - bitsandbytes >=0.45.5,!=0.46.0,!=0.48.0
    # triton
    - triton >=3.0.0
    # huggingface
    - wheel >=0.42.0
    - packaging
    - numpy
    - tqdm
    - psutil
    - tyro
    - protobuf
    - sentencepiece >=0.2.0
    - datasets >=3.4.1,!=4.0.*,!=4.1.0,<4.4.0
    - accelerate >=0.34.1
    - peft >=0.18.0,!=0.11.0
    - huggingface_hub >=0.34.0
    - hf-transfer
    - diffusers
    - transformers >=4.51.3,!=4.52.0,!=4.52.1,!=4.52.2,!=4.52.3,!=4.53.0,!=4.54.0,!=4.55.0,!=4.55.1,!=4.57.0,!=4.57.4,!=4.57.5,!=5.0.0,!=5.1.0,<=5.3.0
    - trl >=0.18.2,!=0.9.0,!=0.9.1,!=0.9.2,!=0.9.3,!=0.15.0,!=0.19.0,<=0.24.0
    - sentence-transformers
    - unsloth_zoo >=2026.4.8
    - torchvision

test:
  # importing requires a GPU
  # imports:
  #   - unsloth
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://github.com/unslothai/unsloth
  summary: 2-5X faster LLM finetuning
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - isuruf
    - timkpaine
